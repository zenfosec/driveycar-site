<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drivey Car</title>
<meta name="description" content="Drivey Car — a new game for iPhone, iPad, and Apple Watch from Satoru Labs. Coming soon.">
<style>
  :root{
    --bg:#FAFAF9; --ink:#25303A; --dim:#6B7680; --accent:#FF5A4E; --line:rgba(37,48,58,.16);
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#14181D; --ink:#E8EDF2; --dim:#97A3AE; --accent:#FF6A5E; --line:rgba(232,237,242,.18); }
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    min-height:100svh; display:flex; flex-direction:column; align-items:center;
    background:var(--bg); color:var(--ink); text-align:center;
    font-family:ui-rounded,"SF Pro Rounded",-apple-system,system-ui,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.6;
  }
  main{ flex:1; display:grid; place-items:center; padding:3rem 1.5rem; }
  .eyebrow{
    font-size:.72rem; font-weight:800; letter-spacing:.34em; text-transform:uppercase;
    color:var(--dim); margin-bottom:1.1rem;
  }
  h1{
    font-size:clamp(2.3rem,9vw,4.1rem); font-weight:900; letter-spacing:.1em;
    line-height:1.05; text-indent:.1em; /* balance the tracked-out caps */
  }
  .rule{
    width:2.75rem; height:3px; border-radius:2px; background:var(--accent);
    margin:1.4rem auto 1.5rem;
  }
  .line{ font-size:1.05rem; font-weight:500; color:var(--dim); max-width:34ch; margin:0 auto 2.4rem; }
  nav{ display:flex; gap:1.6rem; justify-content:center; flex-wrap:wrap; }
  nav a{
    color:var(--ink); font-weight:700; font-size:.95rem; text-decoration:none;
    border-bottom:2px solid var(--line); padding-bottom:2px;
  }
  nav a:hover, nav a:focus-visible{ border-bottom-color:var(--accent); }
  a:focus-visible{ outline:2px solid var(--accent); outline-offset:4px; border-radius:2px; }
  footer{ padding:0 1.5rem 2.2rem; color:var(--dim); font-size:.82rem; }
</style>
</head>
<body>
<main>
  <div>
    <p class="eyebrow">Satoru Labs</p>
    <h1>DRIVEY&nbsp;CAR</h1>
    <div class="rule" aria-hidden="true"></div>
    <p class="line">A new game for iPhone, iPad, and Apple&nbsp;Watch — coming soon.</p>
    <nav aria-label="Site">
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </nav>
  </div>
</main>
<footer>
  <p>&copy; 2026 Satoru Labs</p>
</footer>
</body>
</html>
